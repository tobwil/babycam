# Docker Compose für Pi 4B (pi-one) — mit oder ohne Kamera
# Verwendung:  docker compose -f docker-compose.pi-one.yml up -d
#
# Montiert /dev/snd für Audio. /dev/video0 wird NICHT gemountet
# (Kamera läuft am Zero). Der Container startet trotzdem sauber.

services:
  babycam:
    image: babycam:latest
    container_name: babycam
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - /dev/snd:/dev/snd
      - babycam_data:/app/snapshots
      - ./config.json:/app/config.json
    environment:
      - TZ=Europe/Berlin
      - MQTT_BROKER=192.168.178.131
      - MQTT_PORT=1883
    extra_hosts:
      - "host.docker.internal:host-gateway"
    group_add:
      - "29"   # audio

volumes:
  babycam_data:
