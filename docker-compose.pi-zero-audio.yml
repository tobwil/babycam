# Docker Compose für Pi Zero 2 W — OHNE Kamera (nur Audio + MQTT)
# Verwendung:  docker compose -f docker-compose.pi-zero-audio.yml up -d
#
# Wenn die Kamera am Pi 4B steckt, läuft der Zero als reine Audio-Station.
# /dev/video0 wird nicht gemountet.

services:
  babycam:
    image: babycam:latest
    container_name: babycam
    restart: unless-stopped
    ports:
      - "5000:5000"
    devices:
      - /dev/snd:/dev/snd
    volumes:
      - babycam_data:/app/snapshots
      - ./config.json:/app/config.json
    environment:
      - TZ=Europe/Berlin
      - MQTT_BROKER=192.168.178.131
      - MQTT_PORT=1883
    extra_hosts:
      - "host.docker.internal:host-gateway"
    group_add:
      - "29"   # audio

volumes:
  babycam_data:
