# Docker Compose für Pi Zero 2 W
# Verwendung:  docker compose -f docker-compose.pi-zero.yml up -d
#
# WICHTIG: Die C930e bekommt nicht immer /dev/video0.
# Prüfe mit:  v4l2-ctl --list-devices | grep -A2 C930e
# Passe die devices:-Zeile entsprechend an (z.B. /dev/video1:/dev/video0).

services:
  babycam:
    image: babycam:latest
    container_name: babycam
    restart: unless-stopped
    ports:
      - "5000:5000"
    devices:
      - /dev/video1:/dev/video0   # ← ggf. anpassen (v4l2-ctl --list-devices)
      - /dev/snd:/dev/snd
    volumes:
      - babycam_data:/app/snapshots
      - ./config.json:/app/config.json
    environment:
      - TZ=Europe/Berlin
      - MQTT_BROKER=192.168.178.131
      - MQTT_PORT=1883
    extra_hosts:
      - "host.docker.internal:host-gateway"
    group_add:
      - "29"   # audio
      - "44"   # video

volumes:
  babycam_data:
